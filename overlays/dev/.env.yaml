# Ejemplo de variables de entorno
ENV: "DEV"
DEBUG_MODE: "false"
BROWSER_HEADLESS: "False"  # Ejecutar sin interfaz grafica (requerido para Cloud Run)

# --- GCP ---
PROJECT_GCP: "name-project-gcp-dev"
GCS_BUCKET_NAME: "gcp-name-buscket"
GCS_CARPETA_DESTINO: "Actualización de Parámetros"
GCS_CARPETA_BASE: "rpa"

# --- Email - NOTA: En Cloud Run usar Secret Manager para credenciales ---
# Estas son referencias, los valores reales deben venir de Secret Manager
SMTP_USER: "apikey"
SMTP_PASSWORD: "a"
PROXY_USER: "a"
PROXY_PASSWORD: "a"
EMAIL_FROM: "a"
EMAIL_TO: "a"
